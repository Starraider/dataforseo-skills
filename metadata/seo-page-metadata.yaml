slug: seo-page-metadata
display_name: SEO Page Metadata
summary:
  en: >
    Analyzes one page with DataForSEO MCP, derives five seeds solely from qualifying primary content, ranks related keyword opportunities, and recommends one of three coherent search and social metadata packages.
category: marketing
tags:
  - dataforseo
  - page-metadata
  - keyword-research
  - seo-report
use_cases:
  - Identify five seed keywords solely from primary page content and incorporate explicit geographic targeting when relevant.
  - Research up to 25 related keywords per seed and rank up to 20 opportunities with transparent provenance and scoring.
  - Generate three coherent page, Open Graph, and Twitter Card metadata packages and recommend one.
expected_outputs:
  - A top-20 keyword table with search volume, organic difficulty, Ads competition, opportunity, and seed provenance.
  - Three coherent metadata packages with Unicode code-point counts, one marked recommended.
  - A detailed dated Markdown report saved under the requested report root or SEO/<domain>/ by default.
context_requirements:
  - One absolute HTTP(S) page URL.
  - The official DataForSEO MCP server with the ONPAGE and DATAFORSEO_LABS modules enabled.
  - Filesystem write access and DataForSEO credentials configured in the MCP server; Python 3 is recommended for deterministic validation and normalization but is not required.
action_level: writes_files
risk_level: medium
related_skills:
  - seo-technical-page-audit
  - seo-keyword-research
  - seo-content-suggestions
example_prompts:
  - Analyze https://example.com/products/widget and create improved page and social metadata.
  - Rank keyword opportunities for this landing page and recommend one of three metadata packages.
  - Analyze https://example.de/leistungen/seo in Germany and save the metadata report under ./client-reports.
primary_keywords:
  - seo-metadata
  - meta-title-description
  - keyword-opportunities
