slug: dataforseo-skill
display_name: DataForSEO MCP SEO Analysis
summary:
  en: >
    Selects, sequences, calls, validates, and troubleshoots DataForSEO MCP tools for evidence-based SEO analysis using an exact captured tool catalog and official protocol guidance.
category: marketing
tags:
  - dataforseo
  - mcp
  - seo-analysis
  - api-reference
use_cases:
  - Select the minimum DataForSEO MCP tools for an SEO question.
  - Build cost-aware keyword, SERP, backlink, local, ranking-history, competitor, and page-audit workflows.
  - Troubleshoot authentication, input validation, errors, rate limits, pagination, batching, and responses.
expected_outputs:
  - A scoped DataForSEO MCP call plan or completed analysis with source provenance.
  - Validated provider metrics, coverage, cost, limitations, and derived conclusions.
  - Integration guidance grounded in the active tool schema and official documentation.
context_requirements:
  - The official DataForSEO MCP server with the relevant modules enabled.
  - DataForSEO credentials configured securely in the MCP host.
  - The targets and market parameters required by the requested analysis.
