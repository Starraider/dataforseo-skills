slug: seo-ranking-watchlist
display_name: SEO Ranking Watchlist
summary:
  en: >
    Maintains a local domain keyword watchlist, discovers current ranked keywords, checks live Google positions with a compact direct DataForSEO API helper and MCP fallback, and surfaces changes between saved runs.
category: marketing
tags:
  - dataforseo
  - rank-tracking
  - ranking-watchlist
  - seo-report
use_cases:
  - Create a persistent watchlist from optional target keywords and up to 100 directly discovered keywords, or 20 through MCP fallback.
  - Re-check saved Google organic positions and identify gains, declines, new rankings, and lost rankings.
  - List or remove tracked domains and keywords without making billable calls.
  - Create a detailed Markdown ranking-change report on request.
expected_outputs:
  - A local JSON watchlist with stable scope, active keywords, and dated ranking snapshots.
  - A movement diff against the immediately previous successful check.
  - A short take covering concerning drops, positions 11-20, and one suggested action.
  - An optional dated Markdown report saved under the requested root or SEO/<domain>/ by default.
context_requirements:
  - A target domain for add, check, and remove; target keywords are optional for add.
  - Python 3 and direct DataForSEO API credentials for the preferred helper workflow.
  - The official DataForSEO MCP server with DATAFORSEO_LABS and SERP modules enabled for fallback.
  - Filesystem write access.
action_level: writes_files
risk_level: medium
related_skills:
  - seo-rankings
  - seo-keyword-research
  - seo-content-decay-refresh
example_prompts:
  - Add example.com and its current ranked keywords to a local ranking watchlist.
  - Check example.com again and show every gain, decline, new ranking, and lost ranking.
  - List all watchlists, then remove one keyword without running a new check.
  - Create a detailed ranking-change report from the latest example.com watchlist check.
primary_keywords:
  - ranking-watchlist
  - rank-change-tracking
  - keyword-monitoring
