slug: seo-technical-page-audit
display_name: SEO Technical Page Audit
summary:
  en: >
    Audits one webpage with a task-based DataForSEO MCP OnPage workflow and writes a fix-ready Markdown report with exact URLs and assets where available plus a provider-derived 0-100 Technical Score.
category: marketing
tags:
  - dataforseo
  - technical-seo
  - on-page-audit
  - seo-report
use_cases:
  - Audit one URL for crawlability, indexability, redirects, links, metadata, schema, resources, and performance.
  - Turn DataForSEO OnPage and Lighthouse evidence into prioritized fixes with exact affected URLs or assets where available.
  - Generate a dated technical SEO Markdown report.
expected_outputs:
  - A provider-derived Technical Score from 0 to 100.
  - Evidence-backed findings prioritized from P0 to P3 with concrete fix and validation steps.
  - Exact issue inventories for broken links, redirect chains, schema findings, and resource offenders when returned by DataForSEO.
  - A detailed dated Markdown report saved under the project domain in the requested report root or SEO/<domain>/ by default.
context_requirements:
  - An absolute HTTP(S) page URL, whose hostname supplies the website project domain, or a separately supplied project domain while requesting the URL.
  - The official DataForSEO MCP server with the ONPAGE module enabled.
  - Filesystem write access and DataForSEO credentials configured in the MCP server.
action_level: writes_files
risk_level: medium
related_skills:
  - seo-keyword-research
example_prompts:
  - Audit https://example.com/products/widget for technical SEO and save the Markdown report in the default location.
  - Check this landing page for indexability, redirect, metadata, schema, link, and performance problems.
  - Create a prioritized technical SEO report for https://shop.example.org/category/shoes and use ./reports as the report root.
primary_keywords:
  - technical-seo-audit
  - page-audit
  - dataforseo-onpage
