slug: technical-seo-page-audit
display_name: Technical SEO Page Audit
summary:
  en: >
    Audits one webpage with the DataForSEO MCP OnPage tools and writes a prioritized Markdown report with a provider-derived 0-100 Technical Score.
category: marketing
tags:
  - dataforseo
  - technical-seo
  - on-page-audit
  - seo-report
use_cases:
  - Audit one URL for crawlability, indexability, redirects, links, metadata, schema, and performance.
  - Turn DataForSEO OnPage and Lighthouse evidence into prioritized fixes.
  - Generate a dated technical SEO Markdown report.
expected_outputs:
  - A provider-derived Technical Score from 0 to 100.
  - Evidence-backed findings prioritized from P0 to P3.
  - A detailed dated Markdown report saved to the requested directory or /SEO.
context_requirements:
  - An absolute HTTP(S) page URL.
  - The official DataForSEO MCP server with the ONPAGE module enabled.
  - Filesystem write access and DataForSEO credentials configured in the MCP server.
action_level: writes_files
risk_level: medium
related_skills:
  - dataforseo-api
example_prompts:
  - Audit https://example.com/products/widget for technical SEO and save the Markdown report in the default location.
  - Check this landing page for indexability, redirect, metadata, schema, link, and performance problems.
  - Create a prioritized technical SEO report for https://shop.example.org/category/shoes and save it under ./reports.
primary_keywords:
  - technical-seo-audit
  - page-audit
  - dataforseo-onpage
